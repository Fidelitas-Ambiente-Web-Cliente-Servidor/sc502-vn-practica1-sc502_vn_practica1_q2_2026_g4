<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursos</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link href="css/style.css" rel="stylesheet">
    <link href="css/cursos.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand me-auto" href="index.html">
                <img src="Recursos/img/logo.png" alt="Logo UProgra">
            </a>

            <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasNavbar"
                aria-labelledby="offcanvasNavbarLabel">

                <div class="offcanvas-header">
                    <h5 class="offcanvas-title" id="offcanvasNavbarLabel">Menu</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
                </div>

                <div class="offcanvas-body">
                    <ul class="navbar-nav justify-content-center flex-grow-1 pe-3">
                        <li class="nav-item">
                            <a class="nav-link mx-lg-2" href="index.html">Inicio</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active mx-lg-2" href="cursos.html">Cursos</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link mx-lg-2" href="profesores.html">Profesores</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link mx-lg-2" href="contacto.html">Contacto</a>
                        </li>
                    </ul>
                </div>
            </div>

            <a href="#" class="login-button">Login</a>

            <button class="navbar-toggler pe-0" type="button" data-bs-toggle="offcanvas"
                data-bs-target="#offcanvasNavbar" aria-controls="offcanvasNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
        </div>
    </nav>

    <!-- CONTENIDO GLOBAL -->
    <main>
        <header class="encabezado">
            <h1>Cursos</h1>
            <p>Explora nuestra oferta académica y elige el curso que mejor se adapte a tus metas profesionales.</p>
        </header>

        <!-- BARRA DE BÚSQUEDA -->
        <section class="container busqueda-section">
            <div class="busqueda-box">
                <input type="text" id="buscarCurso" class="form-control"
                    placeholder="Buscar curso por nombre o descripción...">
            </div>
        </section>

        <!-- FILTROS POR CATEGORÍA -->
        <section class="container filtros-section">
            <div class="filtros-box">
                <button class="filtro-btn active" data-categoria="Todos">Todos</button>
                <button class="filtro-btn" data-categoria="Desarrollo Web">Desarrollo Web</button>
                <button class="filtro-btn" data-categoria="Programación">Programación</button>
                <button class="filtro-btn" data-categoria="Frontend">Frontend</button>
                <button class="filtro-btn" data-categoria="Bases de Datos">Bases de Datos</button>
                <button class="filtro-btn" data-categoria="Datos">Datos</button>
                <button class="filtro-btn" data-categoria="Seguridad Informática">Seguridad Informática</button>
            </div>
        </section>

        <!-- CATÁLOGO DE CURSOS -->
        <section class="container cursos-section">
            <h2 class="categoria-titulo">Catálogo de Cursos</h2>

            <div id="contenedorCursos" class="row g-4">
                <!-- Las tarjetas se cargan desde cursos.js -->
            </div>

            <p id="mensajeSinResultados" class="mensaje-sin-resultados">
                No se encontraron cursos con esa búsqueda.
            </p>
        </section>
    </main>

    <!-- FOOTER -->
    <footer>
        <div class="container">
            <ul class="d-flex flex-row">
                <li><a href="#">Texto 1</a></li>
                <li><a href="#">Texto 2</a></li>
                <li><a href="#">Texto 3</a></li>
                <li><a href="#">Texto 4</a></li>
            </ul>

            <ul class="d-flex flex-row">
                <li><i class="fab fa-youtube"></i></li>
                <li><i class="fab fa-twitter"></i></li>
                <li><i class="fab fa-instagram"></i></li>
                <li><i class="fab fa-facebook"></i></li>
            </ul>

            <p>&copy; 2026 UProgra SA</p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous">
        </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous">
        </script>

    <script src="js/cursos.js"></script>
</body>

</html>
